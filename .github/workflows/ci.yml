name: ci

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - id: checkout
        name: Check out repository
        uses: actions/checkout@v4

      - id: setup-java
        name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'

      - id: setup-clojure
        name: Set up Clojure
        uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest

      - id: cache-clojure
        name: Cache Clojure deps
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            .cpcache
          key: ${{ runner.os }}-clojure-${{ hashFiles('deps.edn') }}
          restore-keys: |
            ${{ runner.os }}-clojure-

      - id: format-check
        name: Check formatting
        run: clojure -M:fmt check src test

      - id: test-run
        name: Run tests
        run: xvfb-run -a clojure -M:test
